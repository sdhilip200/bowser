        <h1>bowser — the global fuel story, told from New Zealand</h1>
        <p>
          Bowser is a public dashboard that connects global crude oil markets to
          New Zealand pump prices, built entirely on free public data.
        </p>
        <p>The dashboard has six sections:</p>
        <ul>
          <li>
            <strong>Global crude</strong> — Brent and WTI front-month futures
            over the last twelve months.
          </li>
          <li>
            <strong>NZ retail</strong> — current pump prices for regular 91,
            premium 95 and diesel.
          </li>
          <li>
            <strong>Ten-year history</strong> — a decade of MBIE weekly retail
            prices.
          </li>
          <li>
            <strong>The waterfall</strong> — where each dollar at the pump goes:
            importer cost, ETS, excise and GST.
          </li>
          <li>
            <strong>Fuel supply</strong> — how many days of cover New Zealand
            holds, by fuel type.
          </li>
          <li>
            <strong>News</strong> — New Zealand fuel news alongside global oil
            and geopolitics.
          </li>
        </ul>
        <p>
          Bowser is built and maintained by Dhilip Subramanian, based in
          Wellington, New Zealand.
          <a href="/about">Read more about the project</a>.
        </p>
        <p>
          This dashboard requires JavaScript to display its interactive charts.
        </p>
      </div>
