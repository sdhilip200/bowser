<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400&family=Inter+Tight:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      body {
        background: #faf6f1;
        font-family: "Inter Tight", sans-serif;
        color: #3b2f2f;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 80px;
        position: relative;
        overflow: hidden;
      }
      .frame {
        position: absolute;
        inset: 24px;
        border: 1px solid #e8ddd0;
      }
      .eyebrow {
        font-size: 22px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #5a4e42;
      }
      .wordmark {
        font-family: "Fraunces", serif;
        font-size: 188px;
        line-height: 0.9;
        letter-spacing: -0.03em;
        margin-top: 6px;
      }
      .tagline {
        font-size: 38px;
        line-height: 1.3;
        color: #4a3e32;
        max-width: 720px;
        margin-top: 22px;
      }
      .footer-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        font-size: 24px;
        color: #5a4e42;
        position: relative;
        z-index: 1;
      }
      .url { font-weight: 500; color: #8b5e3c; }
      .chart {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 540px;
        height: 300px;
      }
    </style>
  </head>
  <body>
    <div class="frame"></div>
    <svg class="chart" viewBox="0 0 540 300" preserveAspectRatio="none">
      <polyline
        fill="none"
        stroke="#8b5e3c"
        stroke-width="3"
        points="0,220 60,200 120,232 180,150 240,172 300,92 360,124 420,60 480,104 540,44"
      />
      <polyline
        fill="none"
        stroke="#3b2f2f"
        stroke-opacity="0.32"
        stroke-width="2"
        points="0,252 60,242 120,258 180,212 240,228 300,182 360,202 420,162 480,188 540,150"
      />
    </svg>
    <div>
      <p class="eyebrow">New Zealand · global crude</p>
      <h1 class="wordmark">bowser</h1>
      <p class="tagline">The global fuel story, told from New Zealand.</p>
    </div>
    <div class="footer-row">
      <span class="url">bowser.nz</span>
      <span>Brent · WTI · NZ pump prices · MBIE</span>
    </div>
  </body>
</html>
